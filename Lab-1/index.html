<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSITY MANAGEMENT SYSTEM</title>
</head>
<body>
    <center>
        <h1> AIUB Registration System</h1>
        <h1>AIUB System</h1>
        <h2>Where Leaders are Created</h2>
    </center>
    <h1 align="left">Registration Form</h1>
    <form>
        <table>
            <tr>
                <td>First Name: </td>
                <td><input type="text" name="fName" placeholder="Enter your first name"></td>
            </tr>
            <tr>
                <td>Last Name: </td>
                <td><input type="text" name="lName" placeholder="Enter your last name"></td>
            </tr>
            <tr>
                <td>Age: </td>
                <td><input type="text" name="age" placeholder="Enter your age"></td>
            </tr>
            <tr>
                <td>Designation: </td>
                <td>
                <input type="radio" name="des" value="Junior">Junior
                <input type="radio" name="des" value="Senior">Senior
                <input type="radio" name="des" value="Full Stack">Full Stack
                </td>
            </tr>
            <tr>
                <td>Prefered Language: </td>
                <td>
                <input type="checkbox" name="des" value="Python">Python
                <input type="checkbox" name="des" value="Java">Java
                <input type="checkbox" name="des" value="C++">C++
                </td>
            </tr>
            <tr>
                <td>Choose File: </td>
                <td><input type="file" name="file"></td>
            </tr>
            <tr>
                <td>Email: </td>
                <td><input type="email" name="email" placeholder="Enter your Email"></td>
            </tr>
            <tr>
                <td>Password: </td>
                <td><input type="password" name="password" placeholder="Enter your Password"></td>
            </tr>
            <tr style="height:50px;"> 
                <td><input type="submit" name="submit" value="Log in"></td>
                <td><input type="reset" name="reset" value="Reset"></td>
            </tr>
        </table>
    </form>
</body>
</html>
